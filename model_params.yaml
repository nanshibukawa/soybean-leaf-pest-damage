# =============================================================================
# CONFIGURAÇÃO BASE DO PROJETO
# =============================================================================
random_seed: 42

# =============================================================================
# CONFIGURAÇÃO PADRÃO (usado quando nenhum experiment é especificado)
# =============================================================================
model:
  name: "MobileNetV3Large"
  weights: "imagenet"
  include_top: false
  use_pretrained: true
  use_compression_blocks: false
  use_se_block: false

image:
  size: [224, 224, 3]

training:
  batch_size: 32
  epochs: 10
  dropout_rate: 0.4
  loss: "sparse_categorical_crossentropy"
  metrics: ["accuracy"]
  class_weights:
    0: 0.7
    1: 1.0
    2: 3.5

optimizer:
  name: "adam" 
  learning_rate: 0.0001
  beta_1: 0.9
  beta_2: 0.999
  epsilon: 1e-07
  momentum: 0.9
  rho: 0.9

augmentation:
  enabled: true
  horizontal_flip: true
  rotation_factor: 0.05
  zoom_factor: 0.05
  rotation_range: 20
  brightness_range: [0.8, 1.2]
  zoom_range: [0.9, 1.1]
  contrast_range: [0.1, 1.1]
  gaussian_noise: 0.05
  
  # Augmentation específico por classe (DESABILITADO por padrão)
  # Útil para classes desbalanceadas - aplica augmentation mais agressivo em classes minoritárias
  # Para habilitar, descomente 'class_specific' abaixo
  # class_specific:
  #   "Healthy":  # Classe 2 - minoritária (176 amostras)
  #     rotation_range: 45
  #     brightness_range: [0.6, 1.4]
  #     zoom_range: [0.7, 1.3]
  #     contrast_range: [0.1, 1.1]
  #     gaussian_noise: 0.05
  #   "Diabrotica":  # Classe 1 - intermediária (468 amostras)
  #     rotation_range: 25
  #     brightness_range: [0.75, 1.25]
  #     zoom_range: [0.85, 1.15]
  #   "Caterpillar":  # Classe 0 - majoritária (638 amostras) - augmentation padrão

dataset:
  classes: 3
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

tuning:

  max_trials: 10
  epochs_per_trial: 50
  final_epochs: 200
  search_space:
    mobilenetv3large:
      learning_rate:
        min_value: 1e-4
        max_value: 4e-4
        sampling: "log"
        default: 2e-4
      dropout_rate:
        min_value: 0.0
        max_value: 0.3
        step: 0.05
        default: 0.2
      l2_regularization:
        min_value: 1e-7
        max_value: 1e-4
        sampling: "log"
        default: 1e-5
      unfreeze_last_n_layers:
        min_value: 0
        max_value: 40
        step: 4
        default: 32

    mobilenetv3small:
      learning_rate:
        min_value: 1e-4
        max_value: 4e-4
        sampling: "log"
        default: 2e-4
      dropout_rate:
        min_value: 0.3
        max_value: 0.5
        step: 0.05
        default: 0.4
      l2_regularization:
        min_value: 1e-3
        max_value: 1e-2
        sampling: "log"
        default: 5e-3
      unfreeze_last_n_layers:
        min_value: 20
        max_value: 90
        step: 4
        default: 28

    nasnetmobile:
      learning_rate:
        min_value: 1e-6
        max_value: 5e-4
        sampling: "log"
        default: 1e-4
      dropout_rate:
        min_value: 0.3
        max_value: 0.6
        step: 0.1
        default: 0.45
      l2_regularization:
        min_value: 1e-5
        max_value: 1e-2
        sampling: "log"
        default: 1e-4
      unfreeze_last_n_layers:
        min_value: 16
