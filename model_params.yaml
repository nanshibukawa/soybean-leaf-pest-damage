# =============================================================================
# EXPERIMENTOS POR MODELO
# =============================================================================
experiments:
  # ---------------------------------------------------------------------------
  # MobileNetV3 Large - Modelo leve e rápido (baseline)
  # ---------------------------------------------------------------------------
  mobilenetv3large:
    model:
      name: "MobileNetV3Large"
      use_pretrained: true
      weights: "imagenet"
      use_compression_blocks: false
      use_se_block: false
    image:
      size: [224, 224, 3]
    training:
      batch_size: 32
      epochs: 150
      dropout_rate: 0.4
      class_weights:
        0: 0.7
        1: 1.0
        2: 3.5
    optimizer:
      learning_rate: 0.0001

  # ---------------------------------------------------------------------------
  # MobileNetV3 Small - Modelo ultra-leve para mobile
  # ---------------------------------------------------------------------------
  mobilenetv3small:
    model:
      name: "MobileNetV3Small"
      use_pretrained: true
      weights: "imagenet"
      use_compression_blocks: false
      use_se_block: false
    image:
      size: [224, 224, 3]
    training:
      batch_size: 32
      epochs: 150
      dropout_rate: 0.3
      class_weights:
        0: 0.7
        1: 1.0
        2: 3.5
    optimizer:
      learning_rate: 0.0001

  # ---------------------------------------------------------------------------
  # InceptionV3 - Multi-escala, imagem 299x299
