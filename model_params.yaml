# =============================================================================
# CONFIGURAÇÃO BASE DO PROJETO
# =============================================================================
random_seed: 42

# =============================================================================
# CONFIGURAÇÃO PADRÃO (usado quando nenhum experiment é especificado)
# =============================================================================
model:
  name: "MobileNetV3Large"
  weights: "imagenet"
  include_top: false
  use_pretrained: true
  use_compression_blocks: false
  use_se_block: false

image:
  size: [224, 224, 3]

training:
  batch_size: 32
  epochs: 100
  dropout_rate: 0.4
  loss: "sparse_categorical_crossentropy"
  metrics: ["accuracy"]

optimizer:
  name: "adam" 
  learning_rate: 0.0001
  beta_1: 0.9
  beta_2: 0.999
  epsilon: 1e-07
  momentum: 0.9
  rho: 0.9

augmentation:
  enabled: true
  horizontal_flip: true
  rotation_factor: 0.05
  zoom_factor: 0.05
  rotation_range: 20
  brightness_range: [0.8, 1.2]
  zoom_range: [0.9, 1.1]
  contrast_range: [0.1, 1.1]
  gaussian_noise: 0.05
  
  # Augmentation específico por classe (DESABILITADO por padrão)
  # Útil para classes desbalanceadas - aplica augmentation mais agressivo em classes minoritárias
  # Para habilitar, descomente 'class_specific' abaixo
  # class_specific:
  #   "Healthy":  # Classe 2 - minoritária (176 amostras)
  #     rotation_range: 45
  #     brightness_range: [0.6, 1.4]
  #     zoom_range: [0.7, 1.3]
  #     contrast_range: [0.1, 1.1]
  #     gaussian_noise: 0.05
  #   "Diabrotica":  # Classe 1 - intermediária (468 amostras)
  #     rotation_range: 25
  #     brightness_range: [0.75, 1.25]
  #     zoom_range: [0.85, 1.15]
  #   "Caterpillar":  # Classe 0 - majoritária (638 amostras) - augmentation padrão

dataset:
  classes: 3
  train_ratio: 0.8
  val_ratio: 0.2

tuning:
  max_trials: 30
  epochs_per_trial: 5
  final_epochs: 100
  learning_rate:
    min: 1e-5
    max: 5e-4
  dropout_rate:
    min: 0.2
    max: 0.6
  unfreeze_last_n_layers:
    min: 8
    max: 40

# =============================================================================
# EXPERIMENTOS POR MODELO
# =============================================================================
experiments:
  # ---------------------------------------------------------------------------
  # MobileNetV3 Large - Modelo leve e rápido (baseline)
  # ---------------------------------------------------------------------------
  mobilenetv3large:
    model:
      name: "MobileNetV3Large"
      use_pretrained: true
      weights: "imagenet"
      use_compression_blocks: false
      use_se_block: false
    image:
      size: [224, 224, 3]
    training:
      batch_size: 32
      epochs: 150
      dropout_rate: 0.4
      class_weights:
        0: 0.7
        1: 1.0
        2: 3.5
    optimizer:
      learning_rate: 0.0001

  # ---------------------------------------------------------------------------
  # MobileNetV3 Small - Modelo ultra-leve para mobile
  # ---------------------------------------------------------------------------
  mobilenetv3small:
    model:
      name: "MobileNetV3Small"
      use_pretrained: true
      weights: "imagenet"
      use_compression_blocks: false
      use_se_block: false
    image:
      size: [224, 224, 3]
    training:
      batch_size: 32
      epochs: 150
      dropout_rate: 0.3
      class_weights:
        0: 0.7
        1: 1.0
        2: 3.5
    optimizer:
      learning_rate: 0.0001

  # ---------------------------------------------------------------------------
  # InceptionV3 - Multi-escala, imagem 299x299
  # ---------------------------------------------------------------------------
  inceptionv3:
    model:
      name: "InceptionV3"
      use_pretrained: true
      weights: "imagenet"
      use_compression_blocks: false
      use_se_block: false
    image:
      size: [299, 299, 3]  # InceptionV3 usa 299x299
    training:
      batch_size: 16  # Reduzido devido ao tamanho da imagem
      epochs: 100
      dropout_rate: 0.5
      class_weights:
        0: 0.7
        1: 1.0
        2: 3.5
    optimizer:
      learning_rate: 0.00005  # LR menor para modelo maior

  # ---------------------------------------------------------------------------
  # VGG19 - Clássico, pesado mas efetivo
  # ---------------------------------------------------------------------------
  vgg19:
    model:
      name: "VGG19"
      use_pretrained: true
      weights: "imagenet"
      use_compression_blocks: false
      use_se_block: false
    image:
      size: [224, 224, 3]
    training:
      batch_size: 16  # Modelo pesado
      epochs: 100
      dropout_rate: 0.5
      class_weights:
        0: 1.0
        1: 1.0
        2: 2.5
    optimizer:
      learning_rate: 0.00005

  # ---------------------------------------------------------------------------
  # EfficientNetB0 - Balanceado: precisão vs eficiência
  # ---------------------------------------------------------------------------
  efficientnetb0:
    model:
      name: "EfficientNetB0"
      use_pretrained: true
      weights: "imagenet"
      use_compression_blocks: false
      use_se_block: false
    image:
      size: [224, 224, 3]
    training:
      batch_size: 32
      epochs: 120
      dropout_rate: 0.4
      class_weights:
        0: 0.7
        1: 1.0
        2: 3.5
    optimizer:
      learning_rate: 0.0001

  # ---------------------------------------------------------------------------
  # EfficientNetB7 - Máxima precisão, mais pesado
  # ---------------------------------------------------------------------------
  efficientnetb7:
    model:
      name: "EfficientNetB7"
      use_pretrained: true
      weights: "imagenet"
      use_compression_blocks: false
      use_se_block: false
    image:
      size: [600, 600, 3]  # EfficientNetB7 usa 600x600
    training:
      batch_size: 8  # Muito pesado
      epochs: 80
      dropout_rate: 0.5
      class_weights:
        0: 0.7
        1: 1.0
        2: 3.5
    optimizer:
      learning_rate: 0.00003  # LR bem menor

  # ---------------------------------------------------------------------------
  # NASNetMobile - Descoberto por AutoML, mobile-friendly
  # ---------------------------------------------------------------------------
  nasnetmobile:
    model:
      name: "NASNetMobile"
      use_pretrained: true
      weights: "imagenet"
      use_compression_blocks: false
      use_se_block: false
    image:
      size: [224, 224, 3]
    training:
      batch_size: 32
      epochs: 120
      dropout_rate: 0.4
      class_weights:
        0: 0.7
        1: 1.0
        2: 3.5
    optimizer:
      learning_rate: 0.0001

  # ---------------------------------------------------------------------------
  # NASNetLarge - Descoberto por AutoML, máxima performance
  # ---------------------------------------------------------------------------
  nasnetlarge:
    model:
      name: "NASNetLarge"
      use_pretrained: true
      weights: "imagenet"
      use_compression_blocks: false
      use_se_block: false
    image:
      size: [331, 331, 3]  # NASNetLarge usa 331x331
    training:
      batch_size: 8  # Muito pesado
      epochs: 80
      dropout_rate: 0.5
      class_weights:
        0: 0.7
        1: 1.0
        2: 3.5
    optimizer:
      learning_rate: 0.00003

  # ---------------------------------------------------------------------------
  # EXPERIMENTO: MobileNet com augmentation avançada
  # ---------------------------------------------------------------------------
  mobilenet_advanced:
    model:
      name: "MobileNetV3Large"
      use_pretrained: true
      weights: "imagenet"
      use_compression_blocks: true
      use_se_block: true
    image:
      size: [224, 224, 3]
    training:
      batch_size: 32
      epochs: 300
      dropout_rate: 0.4
      class_weights:
        0: 0.7
        1: 1.0
        2: 3.5
    augmentation:
      enabled: true
      horizontal_flip: true
      rotation_range: 45
      brightness_range: [0.6, 1.4]
      zoom_range: [0.7, 1.3]
      contrast_range: [0.1, 1.1]
      gaussian_noise: 0.05
    optimizer:
      learning_rate: 0.0001